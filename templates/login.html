{% extends "base.html" %}

{% block title %}Login - Data Engine Admin{% endblock %}

{% block show_nav %}{{ false }}{% endblock %}

{% block styles %}
<style>
.login-page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 24px 24px 24px;
  gap: 24px;
}
.login-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}
.login-logo-mark {
  width: 20px;
  height: 20px;
  background: #8b5cf6;
  border-radius: 4px;
}
.login-logo-text {
  color: #fff;
  font-size: 16px;
  font-weight: 600;
}
.login-card {
  background: #18181b;
  border: 1px solid #27272a;
  border-radius: 12px;
  padding: 32px;
  width: 100%;
  max-width: 360px;
}
.login-heading {
  color: #fff;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 24px;
  text-align: center;
}
.login-input {
  width: 100%;
  background: #09090b;
  border: 1px solid #27272a;
  border-radius: 6px;
  padding: 10px 12px;
  color: #fff;
  font-size: 14px;
  font-family: inherit;
  margin-bottom: 12px;
  box-sizing: border-box;
  transition: box-shadow 0.15s;
}
.login-input:focus {
  outline: none;
  box-shadow: 0 0 0 2px #8b5cf6;
  border-color: #8b5cf6;
}
.login-btn {
  width: 100%;
  background: #8b5cf6;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s;
  margin-top: 4px;
}
.login-btn:hover { background: #7c3aed; }
</style>
{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-logo">
    <div class="login-logo-mark"></div>
    <span class="login-logo-text">Data Engine</span>
  </div>

  <div class="login-card">
    <h1 class="login-heading">Sign in</h1>

    {% if error %}
    <div style="background:color-mix(in srgb, var(--danger) 12%, transparent);border:1px solid var(--danger);border-radius:8px;padding:10px 14px;color:var(--danger);font-size:12px;margin-bottom:16px;display:flex;align-items:center;gap:8px">
      <span style="width:6px;height:6px;border-radius:50%;background:var(--danger);flex-shrink:0"></span>
      {{ error }}
    </div>
    {% endif %}

    <form action="/auth/login" method="POST">
      <label for="username" style="color: var(--muted); font-size: 12px; display: block; margin-bottom: 6px;">Username</label>
      <input type="text" name="username" class="login-input" id="username" placeholder="Username" required>
      <label for="password" style="color: var(--muted); font-size: 12px; display: block; margin-bottom: 6px;">Password</label>
      <input type="password" name="password" class="login-input" id="password" placeholder="Password" required>
      <button type="submit" class="login-btn">Sign In</button>
    </form>
  </div>
</div>
{% endblock %}
