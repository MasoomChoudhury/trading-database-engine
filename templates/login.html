{% extends "base.html" %}

{% block title %}Login - Data Engine Admin{% endblock %}

{% block content %}
<div class="flex items-center justify-center pt-20">
    <div class="bg-[#1e293b] p-8 rounded-2xl border border-slate-700 w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
            <p class="text-slate-400">Sign in to manage your trading engine</p>
        </div>

        {% if error %}
        <div
            class="bg-red-900/40 border border-red-500/50 text-red-100 px-4 py-3 rounded-xl mb-6 text-sm flex items-center space-x-3">
            <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form action="/auth/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Username</label>
                <input type="text" name="username" required
                    class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all placeholder-slate-600"
                    placeholder="Enter admin username">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Password</label>
                <input type="password" name="password" required
                    class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all placeholder-slate-600"
                    placeholder="••••••••">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-lg shadow-blue-900/20 active:scale-[0.98]">
                Access Dashboard
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-800 text-center">
            <p class="text-xs text-slate-500">Authorized Personnel Only • Secure Session Enabled</p>
        </div>
    </div>
</div>
{% endblock %}
